<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Notchy</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		%sveltekit.head%
		<script>
			// Apply the default theme before first paint. Theme is in-memory only and
			// defaults to 'light' (settings.svelte.ts); the settings store sets the class
			// again after DB init, but that runs after the splash paints, so without this
			// the app boots dark (:root default) then flashes to light.
			document.documentElement.classList.add('light');
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
